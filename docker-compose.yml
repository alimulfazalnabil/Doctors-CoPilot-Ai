version: '3.8'

services:
  # ==========================================
  # 1. Local Linux Azure Cosmos DB Emulator
  # ==========================================
  cosmos-emulator:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
    container_name: azure-cosmos-emulator
    ports:
      - "8081:8081"
      - "1234:1234"
    environment:
      - AZURE_COSMOS_EMULATOR_ENABLE_DATA_EXPLORER=true
    restart: unless-stopped

  # ==========================================
  # 2. FastAPI Backend (with FFmpeg & Python)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doctors-copilot-backend
    ports:
      - "8000:8000"
    environment:
      - AZURE_COSMOS_ENDPOINT=https://cosmos-emulator:8081/
      - AZURE_COSMOS_KEY=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      - AZURE_SEARCH_ENDPOINT=https://mock-search.search.windows.net
    depends_on:
      - cosmos-emulator
    restart: unless-stopped

  # ==========================================
  # 3. Next.js Frontend
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doctors-copilot-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
